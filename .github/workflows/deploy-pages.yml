name: Deploy static site to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Test
        run: npm test
      - name: Stage exact public allowlist
        id: stage
        shell: bash
        run: |
          stage_path="$(mktemp -d)"
          bash deploy/stage-pages.sh "$stage_path"
          echo "path=$stage_path" >> "$GITHUB_OUTPUT"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.stage.outputs.path }}
      - id: deployment
        uses: actions/deploy-pages@v4
